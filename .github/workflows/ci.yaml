name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: app/package-lock.json
      - name: Install dependencies
        working-directory: app
        run: npm ci
      - name: TypeScript check
        working-directory: app
        run: npx tsc --noEmit
      - name: Run tests
        working-directory: app
        run: npm test

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build Docker image
        working-directory: app
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/platform-app:${{ github.sha }} .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/platform-app:${{ github.sha }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/platform-app:latest
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/platform-app:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/platform-app:latest

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config
      - name: Update Kubernetes deployment
        run: |
          kubectl set image deployment/platform-app \
            app=${{ secrets.DOCKERHUB_USERNAME }}/platform-app:${{ github.sha }}
      - name: Verify deployment
        run: |
          kubectl rollout status deployment/platform-app --timeout=120s

  ansible-lint:
    name: Ansible Lint and Validate
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible
          pip install ansible-lint
      - name: Lint Ansible playbooks
        run: |
          cd ansible
          ansible-lint site.yaml
      - name: Validate Ansible inventory
        run: |
          cd ansible
          ansible-inventory -i inventory/hosts.yaml --list
