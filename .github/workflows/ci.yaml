name: CI Pipeline

# Trigger on every push to main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      # Install dependencies
      - name: Install dependencies
        working-directory: app
        run: npm ci

      # Run TypeScript compiler check
      - name: TypeScript check
        working-directory: app
        run: npx tsc --noEmit

      # Run tests
      - name: Run tests
        working-directory: app
        run: npm test

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test # Only runs if test job passes

    steps:
      # Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Login to DockerHub using secrets
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build and tag image with commit SHA - never use latest as primary tag
      - name: Build Docker image
        working-directory: app
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/platform-app:${{ github.sha }} .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/platform-app:${{ github.sha }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/platform-app:latest

      # Push both tags to DockerHub
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/platform-app:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/platform-app:latest

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build # Only runs if build job passes

    steps:
      # Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Configure kubectl with cluster credentials from secrets
      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config

      # Update the deployment with the new image tagged with commit SHA
      - name: Update Kubernetes deployment
        run: |
          kubectl set image deployment/platform-app \
            app=${{ secrets.DOCKERHUB_USERNAME }}/platform-app:${{ github.sha }}

      # Verify the deployment rolled out successfully
      - name: Verify deployment
        run: |
          kubectl rollout status deployment/platform-app --timeout=120s
